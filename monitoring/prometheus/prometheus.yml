global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    app: project-calendar

scrape_configs:
  - job_name: backend
    static_configs:
      - targets: ['backend:8080']
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: alloy
    static_configs:
      - targets: ['alloy:12345']
    metrics_path: /metrics

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
