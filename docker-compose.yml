services:
  db:
    image: postgres:16
    container_name: project-calendar-db
    environment:
      POSTGRES_USER: pc_admin
      POSTGRES_PASSWORD: pc_password
      POSTGRES_DB: project_calendar
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pc_admin -d project_calendar"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.7.0
    container_name: project-calendar-kafka
    environment:
      - KAFKA_NODE_ID=0
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qw==
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: project-calendar-mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI → http://localhost:8025

  email-consumer:
    build:
      context: ./email-consumer
    container_name: project-calendar-email-consumer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      EMAIL_FROM: noreply@project-calendar.dev
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.
    container_name: project-calendar-core
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: project_calendar
      DB_USER: pc_admin
      DB_PASSWORD: pc_password
      JWT_SECRET: your_secret_key_change_in_production
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      FRONTEND_URL: http://localhost:5173
      SKIP_EMAIL_VERIFICATION: "false"
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  pgdata:
