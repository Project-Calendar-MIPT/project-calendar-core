name: Build & Deploy Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (compile check)
        run: docker build -f Dockerfile. -t calendar-backend:ci .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            # --- Shared network (created once, idempotent) ---
            sudo docker network create calendar-net 2>/dev/null || true

            # --- Kafka / MailHog / email-consumer (from repo) ---
            cd /home/user/calendar/core
            git pull origin main

            cd /home/user/calendar/
            sudo docker compose up -d --build

            sudo docker image prune -f
