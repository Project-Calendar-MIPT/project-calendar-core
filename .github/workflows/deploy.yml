name: Build & Deploy Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Build Docker image
        run: DOCKER_BUILDKIT=1 docker build -f Dockerfile. -t calendar-backend:ci .

      - name: Export image
        run: docker save calendar-backend:ci | gzip > /tmp/backend-image.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-image
          path: /tmp/backend-image.tar.gz
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install -r tests/requirements.txt

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-image
          path: /tmp

      - name: Load Docker image
        run: docker load < /tmp/backend-image.tar.gz

      - name: Create CI compose override
        run: |
          cat > tests/docker-compose.ci-override.yml << 'EOF'
          services:
            backend-test:
              image: calendar-backend:ci
          EOF

      - name: Start test environment
        run: |
          docker compose \
            -f tests/docker-compose.test.yml \
            -f tests/docker-compose.ci-override.yml \
            up -d --no-build

      - name: Early backend startup logs
        run: |
          sleep 8
          docker ps -a
          docker compose \
            -f tests/docker-compose.test.yml \
            -f tests/docker-compose.ci-override.yml \
            logs backend-test

      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:8081/ > /dev/null 2>&1; then
              echo "Backend is ready"
              exit 0
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 3
          done
          echo "Backend failed to start"
          exit 1

      - name: Run integration tests
        run: |
          cd tests
          python -m pytest test_api.py -v --tb=short

      - name: Dump container status and logs
        if: always()
        run: |
          docker ps -a
          docker compose \
            -f tests/docker-compose.test.yml \
            -f tests/docker-compose.ci-override.yml \
            logs

      - name: Teardown
        if: always()
        run: |
          docker compose \
            -f tests/docker-compose.test.yml \
            -f tests/docker-compose.ci-override.yml \
            down -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            cd /home/user/calendar
            git submodule update --remote --recursive --init

            sudo docker compose up -d --build

            sudo docker image prune -f
