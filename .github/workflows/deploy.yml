name: Build & Deploy Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (compile check)
        run: docker build -f Dockerfile. -t calendar-backend:ci .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            cd /home/debian/calendar/core
            git pull origin main
            cd ..

            echo "==> Building new image..."
            sudo docker compose build backend grafana

            echo "==> Restarting backend..."
            sudo docker compose up -d --no-deps backend grafana
            sudo docker image prune -f
